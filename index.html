<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECCHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --primary: #0ff;
  --secondary: #00aaff;
  --danger: #ff0033;
  --font: 'Rajdhani', monospace;
}
body, html { margin:0; padding:0; height:100%; font-family: var(--font); background:var(--bg); color:var(--primary); }
#login, #chat { width:100%; height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; }
button { margin:5px; padding:10px 20px; font-size:1rem; cursor:pointer; background:none; border:2px solid var(--primary); color:var(--primary); }
button:hover { background:var(--primary); color:var(--bg); }
#chatUI { display:none; flex-direction:column; width:90%; max-width:800px; height:90%; background:#111; border:2px solid var(--primary); border-radius:10px; padding:10px; overflow:hidden; }
#messages { flex:1; overflow-y:auto; margin-bottom:10px; }
.message { padding:5px; margin:5px 0; border-radius:5px; position:relative; }
.message.self { background:rgba(0,255,255,0.1); text-align:right; }
.message.peer { background:rgba(0,255,255,0.2); text-align:left; }
.message .time { font-size:0.7rem; color:#00aaff; margin-left:5px; }
.message .edit, .message .del { cursor:pointer; font-size:0.7rem; margin-left:5px; color:#f0f; }
#inputBox { display:flex; gap:5px; }
#inputBox input[type=text]{ flex:1; padding:10px; font-size:1rem; border-radius:5px; border:none; background:#222; color:#0ff; }
#inputBox button{ border:none; border-radius:5px; background:var(--primary); color:var(--bg); }
#fileInput{display:none;}
#wipeclick{margin-top:5px;color:var(--danger);cursor:pointer;}
</style>
</head>
<body>

<div id="login">
  <h1>SECCHAT</h1>
  <button onclick="loginPrompt('nevona5K')">nevona5K</button>
  <button onclick="loginPrompt('ZAREX')">ZAREX</button>
</div>

<div id="chatUI">
  <div id="messages"></div>
  <div id="inputBox">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <input type="file" id="fileInput">
    <button onclick="sendMessage()">Send</button>
    <button onclick="document.getElementById('fileInput').click()">Attach</button>
  </div>
  <div id="wipeclick" onclick="wipeChat()">WIPE ALL CHATS</div>
</div>

<script>
const API = "https://secchat-backend-production.up.railway.app";

let username="", peer="", chatMessages=[], autoDeleteTimers={};

async function loginPrompt(user){
  let pw = prompt(`Enter password for ${user}`);
  const res = await fetch(`${API}/login`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username:user,password:pw})
  });
  if(res.status===200){
    const data = await res.json();
    if(data.ok){
      username = user;
      peer = data.peer;
      document.getElementById('login').style.display='none';
      document.getElementById('chatUI').style.display='flex';
      loadMessages();
      setInterval(loadMessages,3000);
    } else alert("Wrong password");
  } else alert("Login failed");
}

async function loadMessages(){
  const res = await fetch(`${API}/messages`);
  const msgs = await res.json();
  chatMessages = msgs;
  renderMessages();
}

function renderMessages(){
  const container = document.getElementById('messages');
  container.innerHTML="";
  chatMessages.forEach((m,i)=>{
    let div = document.createElement('div');
    div.className='message '+(m.user===username?'self':'peer');
    div.innerHTML=`<span>${m.user}: ${m.text}</span> <span class="time">${m.time}</span>`;
    if(m.user===username){
      const edit=document.createElement('span');
      edit.className='edit'; edit.textContent='✎'; edit.onclick=()=>editMessage(i);
      const del=document.createElement('span');
      del.className='del'; del.textContent='🗑'; del.onclick=()=>deleteMessage(i);
      div.appendChild(edit); div.appendChild(del);
    }
    container.appendChild(div);
  });
  container.scrollTop=container.scrollHeight;
}

async function sendMessage(){
  const input = document.getElementById('messageInput');
  let text=input.value;
  if(!text) return;
  // handle wait:(5s)=auto delete
  const waitMatch = text.match(/^wait:\((\d+)s\)=(.*)$/);
  let timerSec=null;
  if(waitMatch){
    text=waitMatch[2];
    timerSec=parseInt(waitMatch[1])*1000;
  }
  const msgObj={user:username,text};
  chatMessages.push(msgObj);
  renderMessages();
  await fetch(`${API}/messages`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(msgObj)
  });
  if(timerSec){
    const idx = chatMessages.length-1;
    autoDeleteTimers[idx]=setTimeout(()=>deleteMessage(idx),timerSec);
  }
  input.value="";
}

// edit and delete
async function editMessage(idx){
  const newText = prompt("Edit your message:",chatMessages[idx].text);
  if(newText!==null){
    chatMessages[idx].text=newText;
    renderMessages();
    await fetch(`${API}/messages`, {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(chatMessages[idx])
    });
  }
}

async function deleteMessage(idx){
  chatMessages.splice(idx,1);
  renderMessages();
  await fetch(`${API}/wipe`,{
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username,password:prompt("Confirm password to delete")})
  });
}

// WIPE function
async function wipeChat(){
  const pw = prompt("Enter your password to wipe all chats");
  const res = await fetch(`${API}/wipe`,{
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username,password:pw})
  });
  if(res.status===200){chatMessages=[]; renderMessages();}
  else alert("Wrong password");
}

// File attachment
document.getElementById('fileInput').addEventListener('change',async(e)=>{
  const file = e.target.files[0];
  if(!file) return;
  if(file.size>700*1024*1024){ alert("Max 700MB"); return; }
  const reader = new FileReader();
  reader.onload = async ()=> {
    const msgObj={user:username,text:`[File:${file.name}]`,data:reader.result};
    chatMessages.push(msgObj);
    renderMessages();
    await fetch(`${API}/messages`, {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(msgObj)
    });
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
