<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECCHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ================== Global Styles ================== */
  * {margin:0;padding:0;box-sizing:border-box;font-family:'Rajdhani', monospace;}
  body {background:#1e1e2f;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}
  #login, #chat {width:100%;height:100%;position:absolute;top:0;left:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#1e1e2f;}
  button {cursor:pointer;background:#27293d;color:#00fff2;border:none;padding:10px 20px;margin:5px;font-weight:600;border-radius:5px;transition:0.2s;}
  button:hover{background:#00fff2;color:#27293d;}
  input, textarea {padding:10px;border:none;border-radius:5px;margin:5px;width:300px;background:#27293d;color:#fff;}
  #chatContainer {display:flex;flex-direction:column;width:95%;max-width:900px;height:95%;background:#2a2c3c;border-radius:10px;overflow:hidden;}
  #messages {flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
  .message {padding:8px 12px;border-radius:8px;max-width:80%;position:relative;word-wrap:break-word;transition:0.2s;}
  .message.self {align-self:flex-end;background:#00fff2;color:#1b1b2a;}
  .message.other {align-self:flex-start;background:#383a4d;}
  .message span.time {font-size:10px;color:#aaa;position:absolute;bottom:2px;right:8px;}
  #inputContainer {display:flex;padding:10px;background:#1f1f30;}
  #inputContainer textarea {flex:1;height:50px;}
  #inputContainer button {margin-left:5px;}
  .attachment-preview {margin-top:5px;color:#00fff2;font-size:14px;cursor:pointer;}
  @media(max-width:600px){#inputContainer textarea {width:calc(100% - 60px);}}
</style>
</head>
<body>

<!-- ================== LOGIN ================== -->
<div id="login">
  <h2>SECCHAT Login</h2>
  <button onclick="loginPrompt('nevona5K')">nevona5K</button>
  <button onclick="loginPrompt('ZAREX')">ZAREX</button>
</div>

<!-- ================== CHAT ================== -->
<div id="chat" style="display:none;">
  <div id="chatContainer">
    <div id="messages"></div>
    <div id="inputContainer">
      <textarea id="messageInput" placeholder="Type a message..."></textarea>
      <button onclick="sendMessage()">Send</button>
      <input type="file" id="fileInput" style="display:none" multiple>
      <button onclick="document.getElementById('fileInput').click()">Attach</button>
    </div>
  </div>
  <button onclick="doWipe()">WIPE</button>
</div>

<script>
const API = "https://secchat-backend-production.up.railway.app"; // your Railway backend URL
let username = '';
let peer = '';
let chatMessages = [];

// ================== LOGIN ==================
async function loginPrompt(user) {
  let pw = prompt(`Enter password for ${user}:`);
  if(!pw) return;
  const res = await fetch(`${API}/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user,password:pw})
  });
  if(res.status===200){const data=await res.json();
    if(data.ok){username=user;peer=data.peer;document.getElementById('login').style.display='none';document.getElementById('chat').style.display='flex';loadMessages();return;}
  }
  alert("Wrong password!");
}

// ================== MESSAGES ==================
async function loadMessages(){
  try{
    const res=await fetch(`${API}/messages`);
    chatMessages=await res.json();
    renderMessages();
    scrollBottom();
  }catch(e){console.error(e);}
}

function renderMessages(){
  const container=document.getElementById('messages');
  container.innerHTML='';
  chatMessages.forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='message '+(m.user===username?'self':'other');
    div.innerHTML=processMessage(m.text)+'<span class="time">'+m.time+'</span>';
    // edit/delete buttons
    if(m.user===username){
      const editBtn=document.createElement('button');editBtn.textContent='✎';editBtn.style.fontSize='10px';editBtn.onclick=()=>editMessage(i);div.appendChild(editBtn);
      const delBtn=document.createElement('button');delBtn.textContent='🗑';delBtn.style.fontSize='10px';delBtn.onclick=()=>deleteMessage(i);div.appendChild(delBtn);
    }
    container.appendChild(div);
  });
}

// ================== SEND ==================
async function sendMessage(){
  const input=document.getElementById('messageInput');
  let text=input.value.trim();
  if(!text) return;
  // handle wait:(5s)=text
  const waitMatch=text.match(/^wait:\((\d+)s\)=(.*)$/i);
  if(waitMatch){
    const delay=parseInt(waitMatch[1])*1000;const msgText=waitMatch[2];
    text=msgText;
    setTimeout(()=>{chatMessages=chatMessages.filter(m=>m.text!==msgText);renderMessages();},delay);
  }
  const msg={user:username,text:text,time:new Date().toLocaleTimeString()};
  chatMessages.push(msg);
  renderMessages();scrollBottom();input.value='';
  await fetch(`${API}/messages`,{
    method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify(msg)
  });
}

// ================== EDIT/DELETE ==================
function editMessage(idx){
  const newText=prompt("Edit your message:",chatMessages[idx].text);
  if(newText!==null){chatMessages[idx].text=newText;renderMessages();sendMessageEdit(idx,newText);}
}
async function sendMessageEdit(idx,text){
  chatMessages[idx].text=text;
  await fetch(`${API}/messages`,{
    method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify(chatMessages[idx])
  });
}
function deleteMessage(idx){
  chatMessages.splice(idx,1);renderMessages();
  // optionally call wipe endpoint for actual deletion from server
}

// ================== WIPE ==================
async function doWipe(){
  const pw=prompt("Enter your password to wipe all messages:");
  if(!pw) return;
  const res=await fetch(`${API}/wipe`,{
    method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username,password:pw})
  });
  if(res.status===200){chatMessages=[];renderMessages();alert('All chats wiped');}
  else{alert('Wrong password');}
}

// ================== FILE ATTACHMENTS ==================
document.getElementById('fileInput').addEventListener('change',async function(){
  const files=[...this.files];
  for(const f of files){
    const text=`File: ${f.name} (${Math.round(f.size/1024)}KB)`;chatMessages.push({user:username,text:text,time:new Date().toLocaleTimeString()});
    renderMessages();scrollBottom();
  }
  this.value='';
});

// ================== VOICE MESSAGE (BASIC) ==================
let mediaRecorder, audioChunks=[];
async function startRecording(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder=new MediaRecorder(stream);
  mediaRecorder.ondataavailable=e=>{audioChunks.push(e.data);};
  mediaRecorder.onstop=sendVoiceMessage;
  mediaRecorder.start();
}
function stopRecording(){mediaRecorder.stop();}
function sendVoiceMessage(){
  const blob=new Blob(audioChunks,{type:'audio/webm'});
  audioChunks=[];
  const url=URL.createObjectURL(blob);
  chatMessages.push({user:username,text:`Voice Message: [play]`,time:new Date().toLocaleTimeString()});
  renderMessages();scrollBottom();
}

// ================== TEXT → FILE ==================
function processMessage(text){
  const fileMatch=text.match(/^paste\[(.*)\] format=\((.*)\)$/i);
  if(fileMatch){
    const content=fileMatch[1];const ext=fileMatch[2];
    const blob=new Blob([content],{type:'text/plain'});const url=URL.createObjectURL(blob);
    return `<a href="${url}" download="file.${ext}" class="attachment-preview">Download .${ext}</a>`;
  }
  return text.replace(`@${username}`,'<span style="color:#00fff2">@'+username+'</span>');
}

// ================== SCROLL ==================
function scrollBottom(){const c=document.getElementById('messages');c.scrollTop=c.scrollHeight;}
setInterval(loadMessages,3000); // auto-refresh messages
</script>
</body>
</html>
